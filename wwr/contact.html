<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
      content="Ready for a weekend of White Water Rafting?? Contact us today!">
    <meta name="author" content="Ethan Shirley">
    <title>Contact Us | The Wet Bandits</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/z-splash.png" alt="white water rafting logo">
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <!-- HEADER INFO         -->
        <section class="info">
            <h1>The Wet Bandits</h1>
            <p>787 N Rafting Pl</p>
            <p>Whitewater, Nebraska</p>
            <p>+1 908-765-4321</p>
            <p>info@thewetbandits.com</p>
            <!-- Start -->
            <div class="contact-container">
                <div class="map">
                    <iframe
                      src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d28790.88710292553!2d-99.08304431471102!3d40.668036713448956!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2sus!4v1775627652776!5m2!1sen!2sus"
                      width="600" height="450" allowfullscreen="" loading="lazy"
                      referrerpolicy="no-referrer-when-downgrade">
                    </iframe>
                </div>

                <!-- NAME AND EMAIL INPUT BOX -->
                <form class="contact-form">
                    <div class="form-item">
                        <label for="name">Name:</label>
                        <input type="text" id="name" name="name" placeholder=" Placeholder"
                          required>
                    </div>

                    <div class="form-item">
                        <label for="useremail">Email:</label>
                        <input type="email" id="useremail" name="useremail"
                          placeholder=" Placeholder" required>
                    </div>

                    <!-- MESSAGE PURPOSE -->
                    <p>Message Purpose</p>

                    <div class="radio-group">
                        <label for="purpose-general">
                            <input type="radio" id="purpose-general" name="purpose" value="general"
                              required>
                            General Inquiry
                        </label>

                        <label for="purpose-reservation">
                            <input type="radio" id="purpose-reservation" name="purpose"
                              value="reservation">
                            Reservation Question
                        </label>

                        <label for="purpose-suggestion">
                            <input type="radio" id="purpose-suggestion" name="purpose"
                              value="suggestion">
                            Website Suggestion
                        </label>


                        <!-- MESSAGE -->
                        <label for="feedback">Message:</label>
                        <textarea id="feedback" name="feedback" rows="4"
                          placeholder=" Type here"></textarea>


                        <label for="subscribe">Please Subscribe me to the monthly newsletter</label>
                        <input type="checkbox" id="subscribe" name="subscribe">
                        <button type="submit">Get in Touch!</button>
                    </div>
                </form>
            </div>
        </section>

        <section class="adventure">
            <h2>We Are Here to Serve You</h2>
            <div class="gallery">
                <figure>
                    <img src="images/placeholder.png" alt="devil's staircase white water rapid">
                    <figcaption>Employee Profile</figcaption>
                </figure>
                <figure>
                    <img src="images/placeholder.png" alt="widowmaker bend white water rapid">
                    <figcaption>Employee Profile</figcaption>
                </figure>
                <figure>
                    <img src="images/placeholder.png" alt="thunderjaw chute white water rapid">
                    <figcaption>Employee Profile</figcaption>
                </figure>
            </div>
        </section>
    </main>
    <footer>
        <p>©2026 &#10070; The Wet Bandits | Ethan Shirley &#10070;</p>
        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook_icon.png" alt="facebook icon">
            </a>
            <a href="https://youtube.com">
                <img src="images/youtube_icon.png" alt="youtube icon">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram_icon.png" alt="instagram icon">
            </a>
        </nav>
    </footer>
</body>

</html>
